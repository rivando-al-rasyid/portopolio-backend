services:
  traefik:
    image: traefik:v3.1
    restart: always
    command:
      - "--api.dashboard=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.mytlschallenge.acme.tlschallenge=true"
      - "--certificatesresolvers.mytlschallenge.acme.email=${SSL_EMAIL}"
      - "--certificatesresolvers.mytlschallenge.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - traefik_data:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - web

  postgres:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DEFAULT_DB:-postgres}
      PAYLOAD_DB_NAME: ${PAYLOAD_DB_NAME:-payload}
      N8N_DB_NAME: ${N8N_DB_NAME:-n8n}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DEFAULT_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  payload:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${PAYLOAD_DB_NAME:-payload}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      AUTOSHARE_WEBHOOK_SECRET: ${AUTOSHARE_WEBHOOK_SECRET}
      PAYLOAD_PUBLIC_SERVER_URL: ${PAYLOAD_PUBLIC_SERVER_URL}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
    volumes:
      - payload_media:/app/media
    ports:
      - "127.0.0.1:${PAYLOAD_LOCAL_PORT:-3000}:3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.payload.rule=Host(`${APP_SUBDOMAIN}.${DOMAIN_NAME}`)"
      - "traefik.http.routers.payload.entrypoints=web,websecure"
      - "traefik.http.routers.payload.tls=true"
      - "traefik.http.routers.payload.tls.certresolver=mytlschallenge"
      - "traefik.http.routers.payload.middlewares=secure-headers@docker"
      - "traefik.http.services.payload.loadbalancer.server.port=3000"
      - "traefik.http.middlewares.secure-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.secure-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.secure-headers.headers.stsPreload=true"
      - "traefik.http.middlewares.secure-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.secure-headers.headers.browserXssFilter=true"
    networks:
      - web
      - internal

  n8n:
    image: docker.n8n.io/n8nio/n8n:stable
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      payload:
        condition: service_started
    ports:
      - "127.0.0.1:${N8N_LOCAL_PORT:-5678}:5678"
    environment:
      NODE_ENV: production
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_HOST: ${N8N_SUBDOMAIN}.${DOMAIN_NAME}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL}
      WEBHOOK_URL: https://${N8N_SUBDOMAIN}.${DOMAIN_NAME}/
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE}
      TZ: ${GENERIC_TIMEZONE}
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      N8N_SECURE_COOKIE: "true"
      NO_PROXY: payload,postgres,localhost,127.0.0.1
      PAYLOAD_BASE_URL: http://payload:3000
      AUTOSHARE_WEBHOOK_SECRET: ${AUTOSHARE_WEBHOOK_SECRET}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./local-files:/files
      - ./n8n:/n8n-workflows:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`${N8N_SUBDOMAIN}.${DOMAIN_NAME}`)"
      - "traefik.http.routers.n8n.entrypoints=web,websecure"
      - "traefik.http.routers.n8n.tls=true"
      - "traefik.http.routers.n8n.tls.certresolver=mytlschallenge"
      - "traefik.http.routers.n8n.middlewares=secure-headers@docker"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"
    networks:
      - web
      - internal

volumes:
  postgres_data:
  payload_media:
  n8n_data:
  traefik_data:

networks:
  web:
  internal:
    internal: true
