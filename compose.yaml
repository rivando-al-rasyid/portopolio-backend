services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - payload
      - n8n

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/rivando-al-rasyid/portopolio-astro:latest}
    pull_policy: always
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${FRONTEND_CONTAINER_PORT:-80}

      # Internal server-to-server URL from frontend container to Payload.
      PAYLOAD_API_URL: http://payload:3000

      # Browser/public URLs.
      PUBLIC_PAYLOAD_URL: https://${PUBLIC_HOST}
      PUBLIC_SITE_URL: https://${PUBLIC_HOST}
    expose:
      - "${FRONTEND_CONTAINER_PORT:-80}"
    depends_on:
      - payload

  payload:
    image: ${PAYLOAD_IMAGE:-ghcr.io/rivando-al-rasyid/portopolio-backend:latest}
    pull_policy: always
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000

      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${PAYLOAD_DB_NAME}

      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      PAYLOAD_PUBLIC_SERVER_URL: https://${PUBLIC_HOST}
      NEXT_PUBLIC_SITE_URL: https://${PUBLIC_HOST}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-https://${PUBLIC_HOST}}

      # Optional, keep if your backend still has autoshare/share queue logic.
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Asia/Jakarta}
    volumes:
      - media_data:/app/media
    expose:
      - "3000"
    depends_on:
      - postgres

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DEFAULT_DB:-n8n}
      PAYLOAD_DB_NAME: ${PAYLOAD_DB_NAME:-payload}
      N8N_DB_NAME: ${N8N_DB_NAME:-n8n}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    environment:
      TZ: ${GENERIC_TIMEZONE:-Asia/Jakarta}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Asia/Jakarta}

      N8N_HOST: ${PUBLIC_HOST}
      N8N_PORT: 5678
      N8N_PROTOCOL: https

      # n8n is served under /n8n/ on the same domain.
      N8N_PATH: /n8n/
      N8N_EDITOR_BASE_URL: https://${PUBLIC_HOST}/n8n/
      WEBHOOK_URL: https://${PUBLIC_HOST}/n8n/
      N8N_PROXY_HOPS: 1

      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}

      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}

      # Helpful for n8n workflows that connect directly to Payload DB.
      PAYLOAD_DB_HOST: postgres
      PAYLOAD_DB_PORT: 5432
      PAYLOAD_DB_NAME: ${PAYLOAD_DB_NAME:-payload}
      PAYLOAD_DB_USER: ${POSTGRES_USER:-n8n}
      PAYLOAD_DB_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./local-files:/files
      - ./n8n:/n8n-workflows:ro
    expose:
      - "5678"
    depends_on:
      - postgres

volumes:
  postgres_data:
  n8n_data:
  caddy_data:
  caddy_config:
  media_data:
