services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST}
      SSL_EMAIL: ${SSL_EMAIL}
      FRONTEND_CONTAINER_PORT: ${FRONTEND_CONTAINER_PORT:-80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - payload
      - n8n

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DEFAULT_DB:-n8n}
      PAYLOAD_DB_NAME: ${PAYLOAD_DB_NAME:-payload}
      N8N_DB_NAME: ${N8N_DB_NAME:-n8n}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n8n} -d ${POSTGRES_DEFAULT_DB:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 10

  payload:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-n8n}:${POSTGRES_PASSWORD}@postgres:5432/${PAYLOAD_DB_NAME:-payload}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      PAYLOAD_PUBLIC_SERVER_URL: https://${PUBLIC_HOST}
      NEXT_PUBLIC_SITE_URL: https://${PUBLIC_HOST}
      FRONTEND_ORIGIN: https://${PUBLIC_HOST}
      # Keep this only if your backend code still references it.
      AUTOSHARE_WEBHOOK_SECRET: ${AUTOSHARE_WEBHOOK_SECRET:-not-used}
    volumes:
      - payload_media:/app/media

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/rivando-al-rasyid/portopolio-astro:latest}
    pull_policy: always
    restart: unless-stopped
    depends_on:
      payload:
        condition: service_started
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      # If your image serves with Nginx, the container port is usually 80.
      # If your image serves Astro Node directly, set FRONTEND_CONTAINER_PORT=4321 in .env.
      PORT: ${FRONTEND_CONTAINER_PORT:-80}
      PAYLOAD_API_URL: http://payload:3000
      PUBLIC_PAYLOAD_URL: https://${PUBLIC_HOST}
      PUBLIC_SITE_URL: https://${PUBLIC_HOST}

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      payload:
        condition: service_started
    environment:
      TZ: ${GENERIC_TIMEZONE:-Asia/Jakarta}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Asia/Jakarta}

      N8N_HOST: ${PUBLIC_HOST}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      N8N_PATH: /n8n/
      N8N_EDITOR_BASE_URL: https://${PUBLIC_HOST}/n8n/
      WEBHOOK_URL: https://${PUBLIC_HOST}/n8n/
      N8N_PROXY_HOPS: 1
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_SECURE_COOKIE: "true"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"

      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}

      # Useful for workflows that connect directly to Payload/Postgres.
      PAYLOAD_BASE_URL: http://payload:3000
      PAYLOAD_DB_HOST: postgres
      PAYLOAD_DB_PORT: 5432
      PAYLOAD_DB_NAME: ${PAYLOAD_DB_NAME:-payload}
      PAYLOAD_DB_USER: ${POSTGRES_USER:-n8n}
      PAYLOAD_DB_PASSWORD: ${POSTGRES_PASSWORD}
      NO_PROXY: payload,postgres,frontend,localhost,127.0.0.1
    volumes:
      - n8n_data:/home/node/.n8n
      - ./local-files:/files
      - ./n8n:/n8n-workflows:ro

volumes:
  postgres_data:
  payload_media:
  n8n_data:
  caddy_data:
  caddy_config:
