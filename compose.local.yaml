services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DEFAULT_DB:-n8n}
      PAYLOAD_DB_NAME: ${PAYLOAD_DB_NAME:-payload}
      N8N_DB_NAME: ${N8N_DB_NAME:-n8n}
    ports:
      - "127.0.0.1:${POSTGRES_LOCAL_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n8n} -d ${POSTGRES_DEFAULT_DB:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 10

  payload:
    build:
      context: .
      dockerfile: Dockerfile.local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-n8n}:${POSTGRES_PASSWORD}@postgres:5432/${PAYLOAD_DB_NAME:-payload}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      PAYLOAD_PUBLIC_SERVER_URL: http://localhost:${PAYLOAD_LOCAL_PORT:-3000}
      NEXT_PUBLIC_SITE_URL: http://localhost:${FRONTEND_LOCAL_PORT:-4321}
      FRONTEND_ORIGIN: http://localhost:${FRONTEND_LOCAL_PORT:-4321}
      AUTOSHARE_WEBHOOK_SECRET: ${AUTOSHARE_WEBHOOK_SECRET:-not-used}
    ports:
      - "${PAYLOAD_LOCAL_PORT:-3000}:3000"
    volumes:
      - payload_media:/app/media

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/rivando-al-rasyid/portopolio-astro:latest}
    pull_policy: always
    restart: unless-stopped
    depends_on:
      payload:
        condition: service_started
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: ${FRONTEND_CONTAINER_PORT:-80}
      PAYLOAD_API_URL: http://payload:3000
      PUBLIC_PAYLOAD_URL: http://localhost:${PAYLOAD_LOCAL_PORT:-3000}
      PUBLIC_SITE_URL: http://localhost:${FRONTEND_LOCAL_PORT:-4321}
    ports:
      - "${FRONTEND_LOCAL_PORT:-4321}:${FRONTEND_CONTAINER_PORT:-80}"

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      payload:
        condition: service_started
    ports:
      - "${N8N_LOCAL_PORT:-5678}:5678"
    environment:
      TZ: ${GENERIC_TIMEZONE:-Asia/Jakarta}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Asia/Jakarta}
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_EDITOR_BASE_URL: http://localhost:${N8N_LOCAL_PORT:-5678}
      WEBHOOK_URL: http://localhost:${N8N_LOCAL_PORT:-5678}/
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_SECURE_COOKIE: "false"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      PAYLOAD_BASE_URL: http://payload:3000
      PAYLOAD_DB_HOST: postgres
      PAYLOAD_DB_PORT: 5432
      PAYLOAD_DB_NAME: ${PAYLOAD_DB_NAME:-payload}
      PAYLOAD_DB_USER: ${POSTGRES_USER:-n8n}
      PAYLOAD_DB_PASSWORD: ${POSTGRES_PASSWORD}
      NO_PROXY: payload,postgres,frontend,localhost,127.0.0.1
    volumes:
      - n8n_data:/home/node/.n8n
      - ./local-files:/files
      - ./n8n:/n8n-workflows:ro

volumes:
  postgres_data:
  payload_media:
  n8n_data:
