services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DEFAULT_DB:-postgres}
      PAYLOAD_DB_NAME: ${PAYLOAD_DB_NAME:-payload}
      N8N_DB_NAME: ${N8N_DB_NAME:-n8n}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DEFAULT_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 10

  payload:
    build:
      context: .
      dockerfile: Dockerfile.local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${PAYLOAD_DB_NAME:-payload}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      AUTOSHARE_WEBHOOK_SECRET: ${AUTOSHARE_WEBHOOK_SECRET}
      PAYLOAD_PUBLIC_SERVER_URL: http://localhost:${PAYLOAD_LOCAL_PORT:-3000}
      NEXT_PUBLIC_SITE_URL: http://localhost:${PAYLOAD_LOCAL_PORT:-3000}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
    ports:
      - "${PAYLOAD_LOCAL_PORT:-3000}:3000"
    volumes:
      - payload_media:/app/media

  n8n:
    image: docker.n8n.io/n8nio/n8n:stable
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      payload:
        condition: service_started
    ports:
      - "${N8N_LOCAL_PORT:-5678}:5678"
    environment:
      NODE_ENV: production
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_EDITOR_BASE_URL: http://localhost:${N8N_LOCAL_PORT:-5678}
      WEBHOOK_URL: http://localhost:${N8N_LOCAL_PORT:-5678}/
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE}
      TZ: ${GENERIC_TIMEZONE}
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      N8N_SECURE_COOKIE: "false"
      NO_PROXY: payload,postgres,localhost,127.0.0.1
      PAYLOAD_BASE_URL: http://payload:3000
      AUTOSHARE_WEBHOOK_SECRET: ${AUTOSHARE_WEBHOOK_SECRET}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./local-files:/files
      - ./n8n:/n8n-workflows:ro

volumes:
  postgres_data:
  payload_media:
  n8n_data:
